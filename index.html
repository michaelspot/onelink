<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bibly</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* --- Design Copié de Taap.it --- */
        .container {
            max-width: 100%;
            width: 100%;
            text-align: left;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 40px;
            line-height: 1.3;
            text-align: center;
        }

        .step {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            font-size: 17px;
            font-weight: 500;
        }

        .circle {
            min-width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1.5px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-weight: 600;
            font-size: 15px;
        }

        .dots {
            font-weight: 900;
            letter-spacing: 2px;
            font-size: 18px;
        }

        .green-text {
            color: #25D366; /* Vert WhatsApp/Taap */
            font-weight: 700;
        }

        /* --- Loader de redirection (Caché par défaut) --- */
        #redirect-screen {
            display: none;
            text-align: center;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #000;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .footer {
            margin-top: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>

    <div id="instruction-screen" class="container">
        <h1>Pour accéder au lien, suis ces deux étapes simples :</h1>

        <div class="step">
            <div class="circle">1</div>
            <div>Cliquez sur <span class="dots">•••</span> en haut à droite</div>
        </div>

        <div class="step">
            <div class="circle">2</div>
            <div>Puis <span class="green-text">"Ouvrir dans le navigateur"</span></div>
        </div>
        
        <div class="footer">
            Powered by Bibly
        </div>
    </div>

    <div id="redirect-screen">
        <div class="spinner"></div>
        <p>Ouverture de l'App Store...</p>
    </div>

    <script>
        // --- CONFIGURATION ---
        const appLink = "https://apps.apple.com/us/app/bibly-versets-et-motivation/id6757191855";

        // --- DÉTECTION STRICTE ---
        function isTikTokBrowser() {
            var ua = navigator.userAgent || navigator.vendor || window.opera;
            // On cherche tous les mots clés possibles de l'app TikTok
            return (ua.indexOf("TikTok") > -1) || 
                   (ua.indexOf("Musical_ly") > -1) || 
                   (ua.indexOf("ByteLocale") > -1) || 
                   (ua.indexOf("Bytedance") > -1); 
        }

        // --- LOGIQUE PRINCIPALE ---
        if (isTikTokBrowser()) {
            // CAS 1 : On est DANS TikTok.
            // ON NE FAIT RIEN. Absolument rien.
            // Le HTML statique reste affiché. Pas de redirection. Pas d'erreur.
            console.log("TikTok détecté : Redirection bloquée.");
        } else {
            // CAS 2 : On est dans Safari / Chrome (l'utilisateur a suivi les instructions).
            
            // 1. On change l'affichage (on cache le tuto, on montre le loader)
            document.getElementById("instruction-screen").style.display = "none";
            document.getElementById("redirect-screen").style.display = "block";

            // 2. On lance la redirection après un mini délai (pour laisser le loader s'afficher)
            setTimeout(function() {
                window.location.href = appLink;
            }, 500);
        }
    </script>

</body>
</html>
