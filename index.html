<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bibly - Lien App Store</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        /* Design inspiré de Taap.it */
        .container {
            max-width: 100%;
            width: 100%;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 40px;
            color: #1a1a1a;
            line-height: 1.4;
        }

        .step {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            font-size: 18px;
            text-align: left;
            font-weight: 500;
        }

        .circle {
            min-width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-weight: bold;
            font-size: 16px;
        }

        .dots {
            font-weight: 900;
            letter-spacing: 2px;
            font-size: 20px;
        }

        .green-text {
            color: #25D366; /* Couleur style taap/whatsapp */
            font-weight: 700;
        }

        /* Caché par défaut, s'affiche uniquement lors de la vraie redirection */
        #redirect-loader {
            display: none;
            margin-top: 20px;
            font-size: 16px;
            color: #666;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #000;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div id="instruction-box" class="container">
        <h1>Pour accéder au lien, suis ces deux étapes simples :</h1>

        <div class="step">
            <div class="circle">1</div>
            <div>Cliquez sur <span class="dots">•••</span> en haut à droite</div>
        </div>

        <div class="step">
            <div class="circle">2</div>
            <div>Puis <span class="green-text">"Ouvrir dans le navigateur"</span></div>
        </div>
    </div>

    <div id="redirect-loader">
        <div class="spinner"></div>
        <p>Ouverture de l'App Store...</p>
    </div>

    <script>
        // LIEN EXACT DE VOTRE APP
        const appLink = "https://apps.apple.com/us/app/bibly-versets-et-motivation/id6757191855";

        // Détection stricte de l'environnement TikTok / Instagram / Facebook
        var userAgent = navigator.userAgent || navigator.vendor || window.opera;
        var isInAppBrowser = (userAgent.indexOf("TikTok") > -1) || 
                             (userAgent.indexOf("FBAV") > -1) || 
                             (userAgent.indexOf("Instagram") > -1);

        // LOGIQUE INVERSÉE :
        // Si on est dans TikTok -> ON NE FAIT RIEN (le HTML par défaut reste affiché)
        // Si on N'EST PAS dans TikTok -> On lance la redirection
        
        if (!isInAppBrowser) {
            // 1. On cache les instructions car on n'en a plus besoin
            document.getElementById("instruction-box").style.display = "none";
            
            // 2. On affiche le loader
            document.getElementById("redirect-loader").style.display = "block";

            // 3. On redirige
            window.location.href = appLink;
            
            // Sécurité (au cas où href ne suffit pas)
            setTimeout(function() {
                window.location.replace(appLink);
            }, 100);
        }
    </script>

</body>
</html>
