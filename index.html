<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ouverture de Bibly</title>
    <style>
        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; background-color: #f9f9f9; text-align: center; padding: 20px;
        }
        .container { max-width: 400px; background: white; padding: 40px 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { font-size: 1.4rem; margin-bottom: 30px; line-height: 1.3; color: #333; }
        .step { display: flex; align-items: center; margin-bottom: 20px; text-align: left; font-size: 1.1rem; }
        .step-number {
            background: #eee; border: 1px solid #ddd; width: 35px; height: 35px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin-right: 15px; font-weight: bold; flex-shrink: 0;
        }
        .highlight { color: #00d26a; font-weight: bold; }
        #redirect-msg { display: none; font-weight: bold; color: #007AFF; }
    </style>
</head>
<body>

    <div class="container" id="instruction-box">
        <h1>Pour accéder au lien, suis ces deux étapes simples :</h1>
        
        <div class="step">
            <div class="step-number">1</div>
            <div>Cliquez sur <span style="font-weight:bold; letter-spacing: 2px;">•••</span> en haut à droite</div>
        </div>

        <div class="step">
            <div class="step-number">2</div>
            <div>Puis <span class="highlight">"Ouvrir dans le navigateur"</span></div>
        </div>
    </div>

    <div id="redirect-msg">
        <p>Redirection vers l'App Store...</p>
    </div>

    <script>
        const appStoreUrl = "https://apps.apple.com/us/app/bibly-versets-et-motivation/id6757191855";
        
        // Détection plus large de l'environnement TikTok
        const ua = navigator.userAgent || navigator.vendor || window.opera;
        const isRestricted = (ua.indexOf("TikTok") > -1) || (ua.indexOf("AppS") > -1) || (ua.indexOf("FBAN") > -1) || (ua.indexOf("Messenger") > -1);

        if (!isRestricted) {
            // Si on est dans Safari/Chrome, on cache tout et on redirige
            document.getElementById('instruction-box').style.display = 'none';
            document.getElementById('redirect-msg').style.display = 'block';
            window.location.href = appStoreUrl;
        }
        // Si isRestricted est vrai, on ne fait RIEN. La page reste sur les instructions (comme taap.it).
    </script>
</body>
</html>
